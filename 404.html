<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔄 GOMNA AI - Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="text-center">
        <div class="spinner mx-auto mb-6"></div>
        <h1 class="text-3xl font-bold mb-4">🧠 GOMNA AI Platform</h1>
        <p class="text-lg mb-6">Redirecting to main platform...</p>
        <p class="text-sm text-gray-400 mb-4">
            If you're seeing this, GitHub Pages is updating the deployment.
        </p>
        <div class="space-y-3">
            <button onclick="tryMain()" class="block mx-auto bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors">
                Try Main Platform
            </button>
            <button onclick="tryLive()" class="block mx-auto bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-colors">
                Try Live Access
            </button>
        </div>
        <div class="mt-6 text-xs text-gray-500">
            <p>Deployment Status: <span id="status">Checking...</span></p>
        </div>
    </div>

    <script>
        console.log('🔄 404 Redirect page loaded - GitHub Pages updating...');
        
        function tryMain() {
            window.location.href = './index.html';
        }
        
        function tryLive() {
            window.location.href = './live.html';
        }
        
        // Auto-redirect attempts
        let attempts = 0;
        const maxAttempts = 5;
        
        function checkAndRedirect() {
            attempts++;
            document.getElementById('status').textContent = `Attempt ${attempts}/${maxAttempts}`;
            
            if (attempts <= maxAttempts) {
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 2000 * attempts);
            } else {
                document.getElementById('status').textContent = 'Manual redirect required';
            }
        }
        
        // Start checking
        setTimeout(checkAndRedirect, 1000);
    </script>
</body>
</html>
