# Agent-Based LLM Arbitrage Platform Configuration

# Agent Configuration
agents:
  economic:
    polling_hours: 1
    data_age_max_hours: 6
    confidence_min: 0.5
    sources:
      - name: fred
        api_key: ${FRED_API_KEY}
        series:
          - CPIAUCSL  # CPI
          - FEDFUNDS  # Federal Funds Rate
          - UNRATE    # Unemployment Rate
          - M2SL      # M2 Money Supply
          - GDPC1     # Real GDP
      - name: vix
        endpoint: https://api.example.com/vix

  sentiment:
    window_sec: 30
    min_mention_volume: 50
    polarity_confidence_min: 0.4
    sources:
      twitter:
        api_key: ${TWITTER_API_KEY}
        api_secret: ${TWITTER_API_SECRET}
        bearer_token: ${TWITTER_BEARER_TOKEN}
      reddit:
        client_id: ${REDDIT_CLIENT_ID}
        client_secret: ${REDDIT_CLIENT_SECRET}
      google_trends:
        enabled: true
      news_api:
        api_key: ${NEWS_API_KEY}

  price:
    snapshot_ms: 100
    min_24h_volume_usd: 5000000
    orderbook_levels: 100
    exchanges:
      binance:
        ws_url: wss://stream.binance.com:9443/ws
        rest_url: https://api.binance.com
        api_key: ${BINANCE_API_KEY}
        api_secret: ${BINANCE_API_SECRET}
      coinbase:
        ws_url: wss://ws-feed.exchange.coinbase.com
        rest_url: https://api.coinbase.com
        api_key: ${COINBASE_API_KEY}
        api_secret: ${COINBASE_API_SECRET}
      kraken:
        ws_url: wss://ws.kraken.com
        rest_url: https://api.kraken.com
        api_key: ${KRAKEN_API_KEY}
        api_secret: ${KRAKEN_API_SECRET}

  volume:
    window_sec: 60
    liquidity_index_min: 0.2
    depth_levels: 20
    
  trade:
    max_trade_latency_ms: 500
    slippage_estimate_max_pct: 0.02
    vwap_window_sec: 60
    
  image:
    image_age_max_sec: 60
    visual_confidence_min: 0.6
    model_type: resnet50
    embedding_dim: 2048
    
  execution:
    pre_trade_simulate: true
    use_limit_orders: true
    post_only: true
    retry_attempts: 3
    retry_delay_ms: 1000

# Global Constraints
constraints:
  max_open_exposure_pct_of_NAV: 0.03
  api_health_pause_threshold: 2
  event_blackout_sec: 300
  data_freshness_max_sec: 5
  authorized_exchanges:
    - binance
    - coinbase
    - kraken

# Decision Bounds
bounds:
  min_spread_pct_for_execution: 0.005
  llm_confidence_threshold: 0.8
  min_expected_net_profit_usd: 0
  max_hold_time_sec: 3600
  max_simultaneous_trades: 5
  max_slippage_pct_estimate: 0.002
  z_threshold_k: 2.5

# AOS (Arbitrage Opportunity Score) Weights
aos_weights:
  price: 0.4
  sentiment: 0.25
  volume: 0.2
  image: 0.05
  risk: 0.1

# Hyperbolic Embedding Configuration
hyperbolic:
  model: poincare
  curvature: 1.0
  embedding_dim: 128
  neighbor_k: 10
  update_interval_sec: 300

# LLM Configuration
llm:
  provider: anthropic
  model: claude-3-sonnet-20240229
  api_key: ${ANTHROPIC_API_KEY}
  max_tokens: 1000
  temperature: 0.1
  system_prompt: |
    You are an arbitrage fusion assistant. You will be given JSON containing the latest agent outputs. 
    Return only a strict JSON object with fields: predicted_spread_pct (float), confidence (0..1), 
    direction ("converge"|"diverge"), expected_time_s (int), arbitrage_plan (object with buy/sell 
    exchanges and notional_usd), rationale (string, short), risk_flags (array). 
    Do not output anything else.

# Kafka Configuration
kafka:
  brokers:
    - localhost:9092
  topics:
    agents_latest: agents.latest
    fusion_predictions: fusion.predictions
    execution_orders: execution.orders
    validation_outcomes: validation.outcomes
  consumer_group_id: arbitrage-platform

# Database Configuration
database:
  postgres:
    host: ${DB_HOST}
    port: 5432
    database: arbitrage_platform
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    max_connections: 20
  redis:
    host: ${REDIS_HOST}
    port: 6379
    password: ${REDIS_PASSWORD}
    db: 0

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    port: 9090
  grafana:
    port: 3001
  alerts:
    email: ${ALERT_EMAIL}
    slack_webhook: ${SLACK_WEBHOOK}

# Backtesting Configuration
backtesting:
  start_date: 2024-01-01
  end_date: 2024-12-31
  initial_capital_usd: 1000000
  fee_model:
    maker_fee_pct: 0.001
    taker_fee_pct: 0.002
  slippage_model:
    base_slippage_pct: 0.0005
    volume_impact_factor: 0.1

# Risk Management
risk_management:
  circuit_breaker:
    enabled: true
    max_drawdown_pct: 0.05
    time_window_min: 60
  position_limits:
    max_position_size_usd: 100000
    max_leverage: 1.0
  var_calculation:
    confidence_level: 0.99
    time_horizon_hours: 24

# System Configuration
system:
  log_level: info
  log_dir: ./logs
  data_dir: ./data
  checkpoint_interval_sec: 300
  health_check_port: 8080