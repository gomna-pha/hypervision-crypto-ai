<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOMNA AI - Cache Refresh</title>
    <meta http-equiv="refresh" content="3;url=./live-platform.html">
    <style>
        body {
            background: linear-gradient(135deg, #fefbf3 0%, #f5e6d3 40%, #e8dcc7 100%);
            font-family: system-ui, sans-serif;
            display: flex;
            items-center: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white/90;
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 GOMNA AI Platform</h1>
        <div class="loading"></div>
        <p>Loading Latest Real-Time Features...</p>
        <p style="font-size: 14px; color: #666; margin-top: 20px;">
            Redirecting to updated platform in 3 seconds...
        </p>
    </div>
</body>
</html>
