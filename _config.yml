# GitHub Pages Configuration for GOMNA AI Platform
title: "GOMNA AI - Hyperbolic CNN Trading Platform"
description: "Advanced AI Trading with Hyperbolic CNN and Multimodal Data Fusion"

# Use no Jekyll theme to allow custom HTML
theme: null
markdown: kramdown
highlighter: rouge

# Plugins
plugins: []

# Include all HTML files
include:
  - index.html
  - live.html
  - platform-test.html
  - gomna-ai-live.html
  - ".nojekyll"

# Exclude development files
exclude:
  - node_modules/
  - .git/
  - .github/
  - .env.example
  - package*.json
  - "*.py"
  - "*.js"
  - "*.sh"

# Force processing
kramdown:
  input: GFM
  syntax_highlighter: rouge